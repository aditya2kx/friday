name: PR cost finalize (post-merge)

# Post-merge: write merged_at + review cost into BigQuery (friday_dev), then
# post the cost analysis comment to the PR thread. CI authenticates via WIF.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-cost-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    name: Finalize cost record
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      FRIDAY_BQ_PROJECT: friday-prod-7401
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BigQuery client
        run: pip install google-cloud-bigquery google-auth

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Finalize meta + review cost into BQ
        run: |
          python3 scripts/pr_cost_ledger.py set-meta --pr "$PR" \
            --title "${{ github.event.pull_request.title }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --created "${{ github.event.pull_request.created_at }}" \
            --merged "${{ github.event.pull_request.merged_at }}"
          python3 scripts/pr_cost_ledger.py capture-review --pr "$PR" --repo "$REPO" || \
            echo "::notice::no cost comments to reconcile."

      - name: Post post-merge cost analysis comment
        run: |
          {
            echo "### Post-merge cost analysis — PR #$PR"
            echo ""
            echo '```'
            python3 scripts/pr_cost_ledger.py analyze --pr "$PR"
            echo '```'
            echo ""
            echo "_Full breakdown in BigQuery \`friday_dev.vw_pr_cost\` (Grafana dashboard: ported in a later milestone)._"
          } > /tmp/c.md
          gh pr comment "$PR" --body-file /tmp/c.md || echo "::warning::comment failed."
