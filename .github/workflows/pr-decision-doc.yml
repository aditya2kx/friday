name: Decision document
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: 9-field decision document
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 scripts/check_decision_doc.py --body "$PR_BODY"
      - name: §3 covers all changed files
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python3 scripts/check_pr_body_fidelity.py --body "$PR_BODY" --base "$BASE_SHA"
