name: Auto-merge on approval

# When the OPERATOR approves a PR, arm auto-merge so GitHub merges it once all
# required checks are green. This is the Constitution art. 2 mechanism: the
# merge authority is the operator's approval; this workflow is plumbing.

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Arm auto-merge
    if: github.event.review.state == 'APPROVED' && github.event.review.user.login == 'aditya2kx'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.BOT_PAT }}
      PR: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Enable auto-merge (squash)
        run: |
          gh pr merge "$PR" --auto --squash --repo "$REPO" && \
            echo "Auto-merge armed on PR #$PR — merges once required checks pass." || \
            echo "::warning::Could not arm auto-merge on PR #$PR (already merged or draft?)."
